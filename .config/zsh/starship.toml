# =============================================================================
# Starship Prompt Configuration — Agnoster-inspired
# =============================================================================
# Lightweight single-line prompt. Fast over SSH.
# Docs: https://starship.rs/config/

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
command_timeout = 500

format = """$username$hostname$directory$git_branch$git_status$git_state$nodejs$python$rust$java$package$cmd_duration$character"""

# Prompt character
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# Directory
[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold blue"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 🔒"

# Git branch
[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "bold purple"
symbol = " "
truncation_length = 32

# Git status
[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"

# Git state (rebase, merge, etc.)
[git_state]
format = '[\($state( $progress_current/$progress_total)\)]($style) '
style = "bold yellow"

# Username — only shown on SSH or as root
[username]
format = "[$user]($style)@"
style_user = "bold yellow"
style_root = "bold red"
show_always = false

# Hostname — only shown on SSH
[hostname]
format = "[$hostname]($style) "
style = "bold green"
ssh_only = true

# Node.js
[nodejs]
format = "[$symbol$version]($style) "
style = "bold green"
symbol = " "
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_extensions = []

# Python
[python]
format = "[$symbol$version]($style) "
style = "bold yellow"
symbol = " "

# Rust
[rust]
format = "[$symbol$version]($style) "
style = "bold red"
symbol = " "

# Java
[java]
format = "[$symbol$version]($style) "
style = "bold red"
symbol = " "

# Package version
[package]
format = "[$symbol$version]($style) "
style = "bold 208"
symbol = "📦 "
display_private = true

# Command duration (only if >2s)
[cmd_duration]
format = "[$duration]($style) "
style = "bold yellow"
min_time = 2000
