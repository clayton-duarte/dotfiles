# =============================================================================
# tmux Configuration — Session Persistence & Sensible Defaults
# =============================================================================

# --- Session Persistence ---
# Keep sessions alive in the background after detaching
set -g detach-on-destroy off
# Increase scrollback buffer (default is 2000)
set -g history-limit 50000
# Automatically renumber windows when one is closed
set -g renumber-windows on

# --- Terminal & Display ---
# Enable 256 colors
set -g default-terminal "screen-256color"
# Enable mouse support (scroll, click panes, resize)
set -g mouse on
# Start window/pane numbering at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1
# Reduce escape key delay (faster response)
set -sg escape-time 10
# Display status messages for 4 seconds
set -g display-time 4000

# --- Activity Monitoring ---
# Highlight windows with activity in the status bar
setw -g monitor-activity on
set -g visual-activity off

# --- Status Bar ---
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 30
set -g status-left '#[fg=green]#S #[default]'
set -g status-right '#[fg=yellow]#h #[fg=white]%H:%M'

# --- Key Bindings ---
# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
# Split panes with | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# New windows open in the current directory
bind c new-window -c "#{pane_current_path}"
